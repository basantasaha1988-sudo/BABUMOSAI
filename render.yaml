services:
  # Frontend (Streamlit)
  - type: web
    name: babumosai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend.py --server.port=10000 --server.address=0.0.0.0 --server.headless=true

  # Backend (Flask)
  - type: web
    name: babumosai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend.py

